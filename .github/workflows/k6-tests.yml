name: K6 Load Testing (Bun + MongoDB)

on: [push, pull_request]

jobs:
  k6_test:
    name: Run k6 Performance Tests
    runs-on: ubuntu-latest

    # Додаємо підтримку Бази Даних прямо в хмарі!
    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install

      - name: Build Next.js app
        run: bun run build
        env:
          # Тепер база точно буде доступна за цією адресою
          DATABASE_URL: "mongodb://localhost:27017/test"

      - name: Start Next.js Server
        run: bun run start &
        env:
          NODE_ENV: production
          DATABASE_URL: "mongodb://localhost:27017/test"

      - name: Wait for server to be ready
        run: npx wait-on http://localhost:3000/catalog --timeout 120000

      - name: Run Smoke Test with k6
        uses: grafana/k6-action@v0.3.1
        with:
          filename: tests/smoke-test.js
